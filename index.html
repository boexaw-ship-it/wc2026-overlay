<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>WC2026 Watch Along Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#030303;
  --panel:#080808;
  --line:rgba(255,255,255,.12);
  --soft:rgba(255,255,255,.58);
  --white:#fff;
  --green:#76ff03;
}
html,body{
  width:1920px;height:1080px;overflow:hidden;background:transparent;
  font-family:"Barlow Condensed",Arial,sans-serif;color:var(--white);
}
#canvas{position:relative;width:1920px;height:1080px;background:transparent}

#score-card{
  position:absolute;top:0;left:0;right:0;height:142px;
  background:linear-gradient(180deg,#000 0%,#050505 100%);
  display:grid;grid-template-columns:1fr 390px 1fr;align-items:center;
  border-bottom:2px solid rgba(118,255,3,.7);
  z-index:10;
}
.team-head{display:flex;align-items:center;gap:22px;min-width:0;padding:0 44px}
.team-head.right{flex-direction:row-reverse;text-align:right}
.flag{
  width:86px;height:58px;border:1px solid var(--line);border-radius:4px;
  object-fit:cover;background:#111;display:none;flex-shrink:0;
}
.flag-ph{
  width:86px;height:58px;border:1px solid var(--line);border-radius:4px;
  background:#111;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.25);font-size:18px;font-weight:900;letter-spacing:2px;
}
.team-name{
  font-size:54px;font-weight:900;text-transform:uppercase;line-height:.92;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:1px;
}
.formation{margin-top:8px;font-size:21px;font-weight:800;color:var(--green);letter-spacing:3px}
.score-mid{display:flex;flex-direction:column;align-items:center;justify-content:center}
#matchRound{font-size:15px;font-weight:800;letter-spacing:4px;color:var(--soft);text-transform:uppercase}
#scoreline{display:flex;align-items:center;gap:18px;margin-top:2px}
.score-num{font-size:82px;font-weight:900;line-height:.9;min-width:60px;text-align:center}
.score-sep{font-size:58px;font-weight:400;color:rgba(255,255,255,.28)}
#play-time{
  margin-top:4px;display:flex;align-items:center;gap:10px;
  font-size:26px;font-weight:900;letter-spacing:4px;color:var(--green);
}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}

#goal-strip{
  position:absolute;top:142px;left:0;right:0;height:48px;background:rgba(0,0,0,.84);
  display:grid;grid-template-columns:1fr 1fr;align-items:center;border-bottom:1px solid var(--line);z-index:9;
}
.goals{display:flex;gap:14px;align-items:center;min-width:0;padding:0 44px;overflow:hidden}
.goals.right{justify-content:flex-end;text-align:right}
.goal-title{font-size:14px;font-weight:900;letter-spacing:3px;color:rgba(118,255,3,.8);text-transform:uppercase;flex-shrink:0}
.goal-list{display:flex;gap:12px;overflow:hidden;min-width:0}
.goal-item{
  font-size:22px;font-weight:700;color:rgba(255,255,255,.82);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:310px;
}

#main-stage{
  position:absolute;left:0;right:0;top:190px;bottom:0;
  display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:28px 42px 36px;
}
#camera-zone{
  position:relative;overflow:hidden;background:transparent;
  border:2px solid rgba(118,255,3,.72);
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset;
}
#camera-zone::before,#camera-zone::after,#camera-inner::before,#camera-inner::after{
  content:"";position:absolute;width:44px;height:44px;border-color:var(--green);border-style:solid;z-index:3;
}
#camera-zone::before{top:0;left:0;border-width:5px 0 0 5px}
#camera-zone::after{top:0;right:0;border-width:5px 5px 0 0}
#camera-inner{position:absolute;inset:0}
#camera-inner::before{bottom:0;left:0;border-width:0 0 5px 5px}
#camera-inner::after{bottom:0;right:0;border-width:0 5px 5px 0}
#camera-label{
  position:absolute;left:22px;top:18px;background:var(--green);color:#000;
  padding:5px 16px;font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase;z-index:4;
}
#lineups{
  display:grid;grid-template-columns:1fr 1fr;gap:18px;min-width:0;
}
.lineup-panel{
  position:relative;overflow:hidden;background:rgba(3,3,3,.78);
  border:2px solid rgba(255,255,255,.16);
  min-width:0;box-shadow:0 0 0 1px rgba(118,255,3,.22) inset;
}
.lineup-panel::before{
  content:"";position:absolute;inset:14px;border:1px solid rgba(118,255,3,.42);pointer-events:none;z-index:3;
}
.lineup-img{width:100%;height:100%;object-fit:contain;display:none;background:#050505}
.lineup-ph{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;color:rgba(255,255,255,.30);text-align:center;padding:60px;
}
.lineup-ph strong{font-size:68px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.54)}
.lineup-ph span{font-size:28px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(118,255,3,.65)}
.lineup-label{
  position:absolute;left:0;right:0;bottom:0;height:72px;background:rgba(0,0,0,.88);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:900;letter-spacing:4px;text-transform:uppercase;z-index:4;
}

#help{
  position:absolute;right:22px;bottom:16px;color:rgba(255,255,255,.22);
  font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
}
body.clean #help{display:none}
#edit-panel{
  position:absolute;left:42px;bottom:36px;width:500px;z-index:30;
  display:none;grid-template-columns:1fr;gap:10px;
}
body.editing #edit-panel{display:grid}
.edit-card{
  background:rgba(0,0,0,.92);border:1px solid rgba(118,255,3,.55);
  padding:14px;display:grid;gap:10px;
}
.edit-title{font-size:15px;font-weight:900;letter-spacing:3px;color:var(--green);text-transform:uppercase}
.edit-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.edit-btn{
  height:34px;min-width:42px;padding:0 12px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);color:#fff;font:800 16px "Barlow Condensed",Arial,sans-serif;
  letter-spacing:1px;cursor:pointer;text-transform:uppercase;
}
.edit-btn.green{background:var(--green);border-color:var(--green);color:#000}
.edit-btn.red{background:#e33232;border-color:#e33232;color:#fff}
.edit-input{
  height:34px;background:#111;border:1px solid rgba(255,255,255,.16);color:#fff;
  padding:0 10px;font:700 16px "Barlow Condensed",Arial,sans-serif;min-width:0;
}
.edit-input.name{width:170px}
.edit-input.min{width:70px}
</style>
</head>
<body class="clean">
<div id="canvas">
  <section id="score-card">
    <div class="team-head">
      <img class="flag" id="flagA" alt="">
      <div class="flag-ph" id="flagPhA">A</div>
      <div>
        <div class="team-name" id="tnA">Team A</div>
        <div class="formation" id="fmA">4-3-3</div>
      </div>
    </div>

    <div class="score-mid">
      <div id="matchRound">FIFA World Cup 2026</div>
      <div id="scoreline">
        <span class="score-num" id="sA">0</span>
        <span class="score-sep">-</span>
        <span class="score-num" id="sB">0</span>
      </div>
      <div id="play-time"><span class="live-dot"></span><span id="timer-disp">00:00</span></div>
    </div>

    <div class="team-head right">
      <img class="flag" id="flagB" alt="">
      <div class="flag-ph" id="flagPhB">B</div>
      <div>
        <div class="team-name" id="tnB">Team B</div>
        <div class="formation" id="fmB">4-2-3-1</div>
      </div>
    </div>
  </section>

  <section id="goal-strip">
    <div class="goals">
      <div class="goal-title" id="goalTitleA">Team A Goals</div>
      <div class="goal-list" id="gevA"></div>
    </div>
    <div class="goals right">
      <div class="goal-list" id="gevB"></div>
      <div class="goal-title" id="goalTitleB">Team B Goals</div>
    </div>
  </section>

  <section id="main-stage">
    <div id="camera-zone">
      <div id="camera-inner"></div>
      <div id="camera-label">Camera View</div>
    </div>
    <div id="lineups">
      <div class="lineup-panel">
        <img class="lineup-img" id="luImgA" alt="">
        <div class="lineup-ph" id="luPhA"><strong id="luPhNameA">Team A</strong><span>Lineup Photo</span></div>
        <div class="lineup-label" id="luLblA">Team A Lineup</div>
      </div>
      <div class="lineup-panel">
        <img class="lineup-img" id="luImgB" alt="">
        <div class="lineup-ph" id="luPhB"><strong id="luPhNameB">Team B</strong><span>Lineup Photo</span></div>
        <div class="lineup-label" id="luLblB">Team B Lineup</div>
      </div>
    </div>
  </section>

  <aside id="edit-panel">
    <div class="edit-card">
      <div class="edit-title">Score</div>
      <div class="edit-row">
        <button class="edit-btn green" onclick="changeScore('A',1)">A +</button>
        <button class="edit-btn" onclick="changeScore('A',-1)">A -</button>
        <button class="edit-btn green" onclick="changeScore('B',1)">B +</button>
        <button class="edit-btn" onclick="changeScore('B',-1)">B -</button>
      </div>
    </div>
    <div class="edit-card">
      <div class="edit-title">Play Time</div>
      <div class="edit-row">
        <button class="edit-btn green" onclick="startTimer()">Start</button>
        <button class="edit-btn" onclick="pauseTimer()">Pause</button>
        <button class="edit-btn red" onclick="resetTimer()">Reset</button>
        <button class="edit-btn" onclick="adjustTime(-60)">-1m</button>
        <button class="edit-btn" onclick="adjustTime(60)">+1m</button>
      </div>
    </div>
    <div class="edit-card">
      <div class="edit-title">Goal Scorers</div>
      <div class="edit-row">
        <input class="edit-input name" id="goalNameA" placeholder="Team A player">
        <input class="edit-input min" id="goalMinA" placeholder="23'">
        <button class="edit-btn green" onclick="addGoal('A')">Add A</button>
        <button class="edit-btn" onclick="removeGoal('A')">Undo A</button>
      </div>
      <div class="edit-row">
        <input class="edit-input name" id="goalNameB" placeholder="Team B player">
        <input class="edit-input min" id="goalMinB" placeholder="45'">
        <button class="edit-btn green" onclick="addGoal('B')">Add B</button>
        <button class="edit-btn" onclick="removeGoal('B')">Undo B</button>
      </div>
    </div>
  </aside>

  <div id="help">Space Start/Pause | R Reset | A/Z Score A | K/M Score B</div>
</div>

<script src="config.js"></script>
<script>
const cfg = window.CONFIG || {};
const A = cfg.teamA || {};
const B = cfg.teamB || {};
let scoreA = Number(cfg.scoreA || 0);
let scoreB = Number(cfg.scoreB || 0);
let secs = Number(cfg.startSeconds || 0);
let timer = null;
let running = false;
let goalsA = Array.isArray(cfg.goalsA) ? [...cfg.goalsA] : [];
let goalsB = Array.isArray(cfg.goalsB) ? [...cfg.goalsB] : [];
const STORAGE_KEY = "wc2026-overlay-live-state";

function text(id,value){ const el=document.getElementById(id); if(el) el.textContent=value; }
function pad(n){ return String(n).padStart(2,"0"); }
function short(team,fallback){ return team.shortName || team.name || fallback; }

function setImage(imgId,phId,src){
  const img=document.getElementById(imgId);
  const ph=document.getElementById(phId);
  if(!src || !img || !ph) return;
  img.onload=()=>{ img.style.display="block"; ph.style.display="none"; };
  img.onerror=()=>{ img.style.display="none"; ph.style.display="flex"; };
  img.src=src;
}

function setFlag(imgId,phId,src,label){
  const img=document.getElementById(imgId);
  const ph=document.getElementById(phId);
  text(phId,label);
  if(!src || !img || !ph) return;
  img.onload=()=>{ img.style.display="block"; ph.style.display="none"; };
  img.onerror=()=>{ img.style.display="none"; ph.style.display="flex"; };
  img.src=src;
}

function renderGoals(side,items){
  const list=document.getElementById("gev"+side);
  const goals=Array.isArray(items) ? items : [];
  list.innerHTML = goals.length
    ? goals.map(g=>`<span class="goal-item">${String(g)}</span>`).join("")
    : `<span class="goal-item">No goals yet</span>`;
}

function currentState(){
  return { scoreA, scoreB, secs, goalsA, goalsB };
}

function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState())); } catch(e) {}
}

function applyState(state){
  if(!state) return;
  scoreA = Math.max(0, Number(state.scoreA || 0));
  scoreB = Math.max(0, Number(state.scoreB || 0));
  secs = Math.max(0, Number(state.secs || 0));
  goalsA = Array.isArray(state.goalsA) ? state.goalsA : goalsA;
  goalsB = Array.isArray(state.goalsB) ? state.goalsB : goalsB;
  updateScore();
  updateTimer();
  renderGoals("A",goalsA);
  renderGoals("B",goalsB);
}

function loadState(){
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    applyState(saved);
  } catch(e) {}
}

function updateScore(){
  text("sA",scoreA);
  text("sB",scoreB);
}

function updateTimer(){
  text("timer-disp",`${pad(Math.floor(secs/60))}:${pad(secs%60)}`);
}

function startTimer(){
  if(running) return;
  running=true;
  timer=setInterval(()=>{ secs += 1; updateTimer(); saveState(); },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(timer);
}

function resetTimer(){
  pauseTimer();
  secs=0;
  updateTimer();
  saveState();
}

function adjustTime(delta){
  secs=Math.max(0,secs+delta);
  updateTimer();
  saveState();
}

function changeScore(team,delta){
  if(team==="A") scoreA=Math.max(0,scoreA+delta);
  if(team==="B") scoreB=Math.max(0,scoreB+delta);
  updateScore();
  saveState();
}

function addGoal(team){
  const nameEl=document.getElementById("goalName"+team);
  const minEl=document.getElementById("goalMin"+team);
  const name=(nameEl?.value || "").trim();
  const min=(minEl?.value || "").trim();
  if(!name) return;
  const label = min ? `${name} ${min}` : name;
  if(team==="A"){ goalsA.push(label); scoreA += 1; renderGoals("A",goalsA); }
  if(team==="B"){ goalsB.push(label); scoreB += 1; renderGoals("B",goalsB); }
  if(nameEl) nameEl.value="";
  if(minEl) minEl.value="";
  updateScore();
  saveState();
}

function removeGoal(team){
  if(team==="A" && goalsA.length){ goalsA.pop(); scoreA=Math.max(0,scoreA-1); renderGoals("A",goalsA); }
  if(team==="B" && goalsB.length){ goalsB.pop(); scoreB=Math.max(0,scoreB-1); renderGoals("B",goalsB); }
  updateScore();
  saveState();
}

function init(){
  text("tnA",A.name || "Team A");
  text("tnB",B.name || "Team B");
  text("fmA",A.formation || "");
  text("fmB",B.formation || "");
  text("matchRound",cfg.matchRound || cfg.matchTitle || "FIFA World Cup 2026");
  text("goalTitleA",`${short(A,"A")} Goals`);
  text("goalTitleB",`${short(B,"B")} Goals`);
  text("luLblA",`${short(A,"Team A")} Lineup`);
  text("luLblB",`${short(B,"Team B")} Lineup`);
  text("luPhNameA",short(A,"Team A"));
  text("luPhNameB",short(B,"Team B"));
  setFlag("flagA","flagPhA",A.flagFile,short(A,"A").slice(0,3).toUpperCase());
  setFlag("flagB","flagPhB",B.flagFile,short(B,"B").slice(0,3).toUpperCase());
  setImage("luImgA","luPhA",A.lineupFile);
  setImage("luImgB","luPhB",B.lineupFile);
  if(new URLSearchParams(location.search).get("edit")==="1"){
    document.body.classList.add("editing");
    document.body.classList.remove("clean");
  }
  renderGoals("A",goalsA);
  renderGoals("B",goalsB);
  updateScore();
  updateTimer();
  loadState();
}

window.addEventListener("keydown",(e)=>{
  if(e.code==="Space"){ e.preventDefault(); running ? pauseTimer() : startTimer(); }
  if(e.key.toLowerCase()==="r") resetTimer();
  if(e.key.toLowerCase()==="a") changeScore("A",1);
  if(e.key.toLowerCase()==="z") changeScore("A",-1);
  if(e.key.toLowerCase()==="k") changeScore("B",1);
  if(e.key.toLowerCase()==="m") changeScore("B",-1);
  if(e.key.toLowerCase()==="e") document.body.classList.toggle("editing");
  if(e.key.toLowerCase()==="h") document.body.classList.toggle("clean");
});

window.addEventListener("storage",(e)=>{
  if(e.key!==STORAGE_KEY) return;
  try { applyState(JSON.parse(e.newValue || "null")); } catch(err) {}
});

window.onload=init;
</script>
</body>
</html>
